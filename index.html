<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开！！ · Minecraft 导航台</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", monospace;
        }

        body {
            background: url("https://cdn.mcblock.top/uploads/wallpapers/wp_1769739570200_056ucju6/compressed.webp") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            padding-right: 40px;
            position: relative;
            transition: filter 0.6s ease;
        }

        /* ===== 时间面板 ===== */
        .time-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #8b6b4bcc;
            border: 6px solid #5c432e;
            box-shadow: inset 0 0 0 3px #a07d58, 0 8px 0 #3a281a;
            padding: 16px 24px;
            border-radius: 4px;
            color: #fff;
            text-shadow: 3px 3px 0 #222;
            text-align: center;
            z-index: 99;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            min-width: 180px;
        }
        .time-panel:active {
            transform: scale(0.95);
        }
        .time-hms {
            font-size: 32px;
            margin-bottom: 4px;
            letter-spacing: 2px;
        }
        .time-date {
            font-size: 16px;
            letter-spacing: 1px;
        }
        .time-sync-status {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            letter-spacing: 1px;
            min-height: 14px;
            transition: all 0.3s;
        }
        .time-format-hint {
            font-size: 9px;
            margin-top: 2px;
            opacity: 0.4;
            letter-spacing: 1px;
        }
        .visit-counter {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
            letter-spacing: 1px;
            color: #ffd700;
        }

        /* ===== 背景切换器 ===== */
        .bg-switcher {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            width: 42px;
            height: 42px;
            background: #8b6b4bcc;
            border: 4px solid #5c432e;
            box-shadow: inset 0 0 0 2px #a07d58, 0 5px 0 #3a281a;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 0 #222;
            user-select: none;
            transition: all 0.08s ease;
            text-align: center;
            line-height: 1;
        }
        .bg-switcher:active {
            transform: translateY(3px);
            box-shadow: inset 0 0 0 2px #a07d58, 0 2px 0 #3a281a;
        }
        .bg-switcher .icon {
            pointer-events: none;
        }
        .bg-tooltip {
            position: fixed;
            bottom: 74px;
            right: 24px;
            z-index: 101;
            background: #2a1f14dd;
            border: 3px solid #5c432e;
            color: #fff;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
            white-space: nowrap;
            text-shadow: 1px 1px 0 #000;
        }
        .bg-tooltip.show {
            opacity: 1;
        }

        /* ===== 全屏按钮 ===== */
        .fullscreen-btn {
            position: fixed;
            bottom: 76px;
            right: 24px;
            z-index: 100;
            width: 42px;
            height: 42px;
            background: #8b6b4bcc;
            border: 4px solid #5c432e;
            box-shadow: inset 0 0 0 2px #a07d58, 0 5px 0 #3a281a;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            text-shadow: 2px 2px 0 #222;
            user-select: none;
            transition: all 0.08s ease;
            text-align: center;
            line-height: 1;
        }
        .fullscreen-btn:active {
            transform: translateY(3px);
            box-shadow: inset 0 0 0 2px #a07d58, 0 2px 0 #3a281a;
        }
        .fullscreen-btn .icon {
            pointer-events: none;
        }

        /* ===== 主面板 ===== */
        .mc-panel {
            background: #8b6b4bcc;
            border: 6px solid #5c432e;
            box-shadow: inset 0 0 0 3px #a07d58, 0 8px 0 #3a281a;
            padding: 28px 24px 20px;
            border-radius: 4px;
            width: 380px;
            max-height: 88vh;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 10;
            transition: width 0.2s;
        }
        .mc-panel::-webkit-scrollbar {
            width: 12px;
        }
        .mc-panel::-webkit-scrollbar-track {
            background: #5c432e;
            border-radius: 2px;
        }
        .mc-panel::-webkit-scrollbar-thumb {
            background: #a07d58;
            border: 2px solid #5c432e;
            border-radius: 2px;
        }
        .mc-panel::-webkit-scrollbar-thumb:hover {
            background: #b8936b;
        }

        .mc-title {
            color: #fff;
            text-shadow: 3px 3px 0 #222;
            font-size: 36px;
            text-align: center;
            margin-bottom: 18px;
            letter-spacing: 2px;
        }

        /* ===== 搜索区域 ===== */
        .search-wrapper {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1 1 100%;
            min-width: 0;
            background: #5c3d24;
            border: 4px solid #3a2514;
            box-shadow: inset 0 0 0 2px #7a5538, 0 4px 0 #2a1a0c;
            color: #fff;
            font-size: 16px;
            padding: 10px 14px;
            border-radius: 3px;
            outline: none;
            letter-spacing: 1px;
            transition: all 0.1s;
        }
        .search-input::placeholder {
            color: #bba98d;
            text-shadow: 1px 1px 0 #222;
        }
        .search-input:focus {
            border-color: #8fc761;
            box-shadow: inset 0 0 0 2px #a0d870, 0 4px 0 #2a4713;
        }
        .search-engine-tabs {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            width: 100%;
        }
        .search-engine-tab {
            flex: 1;
            min-width: 44px;
            text-align: center;
            padding: 7px 4px;
            font-size: 12px;
            cursor: pointer;
            background: #5c432e;
            border: 3px solid #3a2514;
            box-shadow: inset 0 0 0 1px #7a5538, 0 3px 0 #2a1a0c;
            color: #cbb99a;
            border-radius: 3px;
            user-select: none;
            transition: all 0.08s;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #1a0a00;
        }
        .search-engine-tab.active {
            background: #679942;
            border-color: #3d6320;
            box-shadow: inset 0 0 0 2px #8fc761, 0 3px 0 #2a4713;
            color: #fff;
            text-shadow: 2px 2px 0 #1a3a08;
        }
        .search-engine-tab:active {
            transform: translateY(2px);
            box-shadow: inset 0 0 0 1px #7a5538, 0 1px 0 #2a1a0c;
        }
        .search-engine-tab.active:active {
            box-shadow: inset 0 0 0 2px #8fc761, 0 1px 0 #2a4713;
        }
        .search-btn {
            flex: 0 0 auto;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            background: #679942;
            border: 3px solid #3d6320;
            box-shadow: inset 0 0 0 2px #8fc761, 0 3px 0 #2a4713;
            color: #fff;
            border-radius: 3px;
            user-select: none;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #1a3a08;
            transition: all 0.08s;
            white-space: nowrap;
        }
        .search-btn:active {
            transform: translateY(2px);
            box-shadow: inset 0 0 0 2px #8fc761, 0 1px 0 #2a4713;
        }
        .search-divider {
            width: 100%;
            height: 2px;
            background: #5c432e;
            margin: 10px 0 14px 0;
            border-radius: 1px;
            opacity: 0.7;
        }

        /* ===== 链接工具栏 ===== */
        .link-toolbar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            align-items: center;
        }
        .link-toolbar .filter-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            flex: 1;
        }
        .link-toolbar .filter-tab {
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            background: #5c432e;
            border: 3px solid #3a2514;
            box-shadow: inset 0 0 0 1px #7a5538, 0 3px 0 #2a1a0c;
            color: #cbb99a;
            border-radius: 3px;
            user-select: none;
            transition: all 0.08s;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 #1a0a00;
        }
        .link-toolbar .filter-tab.active {
            background: #679942;
            border-color: #3d6320;
            box-shadow: inset 0 0 0 2px #8fc761, 0 3px 0 #2a4713;
            color: #fff;
            text-shadow: 2px 2px 0 #1a3a08;
        }
        .link-toolbar .filter-tab:active {
            transform: translateY(2px);
            box-shadow: inset 0 0 0 1px #7a5538, 0 1px 0 #2a1a0c;
        }
        .link-toolbar .filter-tab.active:active {
            box-shadow: inset 0 0 0 2px #8fc761, 0 1px 0 #2a4713;
        }
        .link-toolbar .link-search-input {
            flex: 0 0 120px;
            min-width: 80px;
            background: #5c3d24;
            border: 3px solid #3a2514;
            box-shadow: inset 0 0 0 1px #7a5538, 0 3px 0 #2a1a0c;
            color: #fff;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 3px;
            outline: none;
            transition: all 0.1s;
            letter-spacing: 0.5px;
        }
        .link-toolbar .link-search-input::placeholder {
            color: #bba98d;
            text-shadow: 1px 1px 0 #222;
        }
        .link-toolbar .link-search-input:focus {
            border-color: #8fc761;
            box-shadow: inset 0 0 0 1px #a0d870, 0 3px 0 #2a4713;
        }
        .link-toolbar .manage-btn {
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            background: #8b6b4b;
            border: 3px solid #5c432e;
            box-shadow: inset 0 0 0 1px #a07d58, 0 3px 0 #3a281a;
            color: #fff;
            border-radius: 3px;
            user-select: none;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #222;
            transition: all 0.08s;
            white-space: nowrap;
        }
        .link-toolbar .manage-btn:active {
            transform: translateY(2px);
            box-shadow: inset 0 0 0 1px #a07d58, 0 1px 0 #3a281a;
        }

        /* ===== 链接列表 ===== */
        #presetLinks {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 6px;
        }
        .link-item {
            display: block;
            width: 100%;
            text-align: center;
            text-decoration: none;
            color: white;
            font-size: 17px;
            padding: 12px 0;
            background: #679942;
            border: 4px solid #3d6320;
            box-shadow: inset 0 0 0 2px #8fc761, 0 5px 0 #2a4713;
            transition: all 0.08s ease;
            position: relative;
            cursor: pointer;
            border-radius: 2px;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 #1a3a08;
        }
        .link-item:active {
            transform: translateY(3px);
            box-shadow: inset 0 0 0 2px #8fc761, 0 2px 0 #2a4713;
        }
        .link-item.error {
            background: #777777;
            border-color: #444444;
            box-shadow: inset 0 0 0 2px #999, 0 5px 0 #222;
            text-shadow: 1px 1px 0 #222;
        }
        .link-item .link-category {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 9px;
            background: #2a1a0c88;
            padding: 2px 8px;
            border-radius: 2px;
            color: #ddd;
            text-shadow: none;
            letter-spacing: 0.5px;
            border: 1px solid #5c432e66;
        }
        .link-item .link-delete {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            background: transparent;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            text-shadow: 1px 1px 0 #2a0a0a;
            opacity: 0;
            transition: opacity 0.15s;
            line-height: 1;
            padding: 0 4px;
        }
        .link-item:hover .link-delete {
            opacity: 0.8;
        }
        .link-item .link-delete:hover {
            opacity: 1;
            transform: scale(1.15);
        }
        .link-item .link-edit {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            background: transparent;
            border: none;
            color: #ffd93d;
            cursor: pointer;
            text-shadow: 1px 1px 0 #2a2a0a;
            opacity: 0;
            transition: opacity 0.15s;
            line-height: 1;
            padding: 0 4px;
        }
        .link-item:hover .link-edit {
            opacity: 0.8;
        }
        .link-item .link-edit:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .link-item .link-title {
            display: inline-block;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .link-item .link-badge {
            font-size: 9px;
            background: #2a1a0c88;
            padding: 1px 6px;
            border-radius: 2px;
            margin-left: 6px;
            color: #ddd;
            border: 1px solid #5c432e66;
        }
        .no-links-msg {
            color: #ccc;
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
            text-shadow: 1px 1px 0 #222;
            letter-spacing: 1px;
        }

        /* ===== 名言区域 ===== */
        .tip-section {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 2px solid #5c432e66;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .tip-label {
            color: #ffd700;
            font-size: 13px;
            text-shadow: 2px 2px 0 #222;
            white-space: nowrap;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .tip-content {
            color: #eee;
            font-size: 13px;
            text-shadow: 1px 1px 0 #222;
            flex: 1;
            letter-spacing: 0.5px;
            line-height: 1.5;
            min-height: 20px;
        }
        .tip-refresh {
            background: transparent;
            border: 2px solid #5c432e;
            color: #ddd;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 8px;
            border-radius: 3px;
            transition: all 0.1s;
            text-shadow: 1px 1px 0 #222;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .tip-refresh:active {
            transform: scale(0.9);
        }

        /* ===== 页脚 ===== */
        .tip-text {
            color: #eee;
            text-shadow: 2px 2px #000;
            margin-top: 12px;
            font-size: 14px;
            text-align: center;
            cursor: default;
            user-select: none;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
            padding: 20px;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: #6d4f3a;
            border: 8px solid #4d3422;
            box-shadow: inset 0 0 0 4px #8b6b4b, 0 12px 0 #2a1a0c;
            padding: 28px 26px 22px;
            border-radius: 4px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-box::-webkit-scrollbar {
            width: 10px;
        }
        .modal-box::-webkit-scrollbar-track {
            background: #4d3422;
            border-radius: 2px;
        }
        .modal-box::-webkit-scrollbar-thumb {
            background: #8b6b4b;
            border: 2px solid #4d3422;
            border-radius: 2px;
        }
        .modal-title {
            color: #fff;
            text-shadow: 3px 3px 0 #222;
            font-size: 28px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 28px;
            color: #fff;
            text-shadow: 2px 2px 0 #222;
            cursor: pointer;
            background: transparent;
            border: none;
            line-height: 1;
            transition: transform 0.1s;
        }
        .modal-close:active {
            transform: scale(0.85);
        }
        .modal-form label {
            display: block;
            color: #eee;
            font-size: 14px;
            text-shadow: 1px 1px 0 #222;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }
        .modal-form input,
        .modal-form select {
            width: 100%;
            background: #4d3422;
            border: 4px solid #3a2514;
            box-shadow: inset 0 0 0 2px #6d4f3a, 0 4px 0 #2a1a0c;
            color: #fff;
            font-size: 15px;
            padding: 8px 12px;
            border-radius: 3px;
            outline: none;
            margin-bottom: 14px;
            transition: all 0.1s;
        }
        .modal-form input:focus,
        .modal-form select:focus {
            border-color: #8fc761;
            box-shadow: inset 0 0 0 2px #a0d870, 0 4px 0 #2a4713;
        }
        .modal-form input::placeholder {
            color: #bba98d;
        }
        .modal-form select option {
            background: #4d3422;
            color: #fff;
        }
        .modal-form .form-row {
            display: flex;
            gap: 10px;
        }
        .modal-form .form-row>* {
            flex: 1;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        .modal-actions button {
            flex: 1;
            padding: 10px 0;
            font-size: 16px;
            cursor: pointer;
            border-radius: 3px;
            border: 4px solid #3d6320;
            box-shadow: inset 0 0 0 2px #8fc761, 0 5px 0 #2a4713;
            color: #fff;
            text-shadow: 2px 2px 0 #1a3a08;
            transition: all 0.08s;
            user-select: none;
            letter-spacing: 1px;
            background: #679942;
        }
        .modal-actions button:active {
            transform: translateY(3px);
            box-shadow: inset 0 0 0 2px #8fc761, 0 2px 0 #2a4713;
        }
        .modal-actions button.btn-secondary {
            background: #8b6b4b;
            border-color: #5c432e;
            box-shadow: inset 0 0 0 2px #a07d58, 0 5px 0 #3a281a;
            text-shadow: 2px 2px 0 #222;
        }
        .modal-actions button.btn-secondary:active {
            box-shadow: inset 0 0 0 2px #a07d58, 0 2px 0 #3a281a;
        }
        .modal-actions button.btn-danger {
            background: #b34141;
            border-color: #7a2a2a;
            box-shadow: inset 0 0 0 2px #d66a6a, 0 5px 0 #4a1a1a;
            text-shadow: 2px 2px 0 #3a0a0a;
        }
        .modal-actions button.btn-danger:active {
            box-shadow: inset 0 0 0 2px #d66a6a, 0 2px 0 #4a1a1a;
        }
        .modal-edit-id {
            display: none;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding-right: 10px;
                align-items: center;
                justify-content: flex-start;
                padding-top: 120px;
            }
            .mc-panel {
                width: 94vw;
                padding: 18px 12px 16px;
                max-height: 72vh;
            }
            .time-panel {
                top: 8px;
                left: 8px;
                padding: 10px 14px;
                border-width: 4px;
                min-width: auto;
            }
            .time-hms {
                font-size: 22px;
            }
            .time-date {
                font-size: 12px;
            }
            .bg-switcher {
                bottom: 12px;
                right: 12px;
                width: 34px;
                height: 34px;
                font-size: 15px;
            }
            .bg-tooltip {
                bottom: 54px;
                right: 12px;
                font-size: 10px;
            }
            .fullscreen-btn {
                bottom: 56px;
                right: 12px;
                width: 34px;
                height: 34px;
                font-size: 13px;
            }
            .mc-title {
                font-size: 28px;
            }
            .link-item {
                font-size: 15px;
                padding: 10px 0;
            }
            .link-item .link-category {
                display: none;
            }
            .link-item .link-delete,
            .link-item .link-edit {
                opacity: 0.6;
            }
            .modal-box {
                padding: 20px 16px 16px;
            }
            .modal-title {
                font-size: 22px;
            }
            .link-toolbar .link-search-input {
                flex: 1;
                min-width: 60px;
            }
            .link-toolbar .filter-group {
                flex-wrap: wrap;
            }
            .tip-section {
                flex-wrap: wrap;
            }
            .tip-label {
                font-size: 12px;
            }
            .tip-content {
                font-size: 12px;
            }
            .modal-form .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
        @media (max-width: 400px) {
            .link-toolbar .filter-tab {
                font-size: 10px;
                padding: 3px 6px;
            }
            .link-toolbar .link-search-input {
                font-size: 11px;
                padding: 3px 6px;
            }
            .link-toolbar .manage-btn {
                font-size: 10px;
                padding: 3px 8px;
            }
            .search-engine-tab {
                font-size: 10px;
                padding: 5px 2px;
                min-width: 36px;
            }
            .search-input {
                font-size: 14px;
                padding: 8px 10px;
            }
            .search-btn {
                font-size: 12px;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 时间面板 ===== -->
    <div class="time-panel" id="timePanel" title="点击切换12/24小时制">
        <div class="time-hms" id="hms">--:--:--</div>
        <div class="time-date" id="date">加载中...</div>
        <div class="time-sync-status" id="syncStatus">⏳ 正在同步网络时间</div>
        <div class="time-format-hint" id="formatHint">点击切换时间格式</div>
        <div class="visit-counter" id="visitCounter">📊 今日访问: --</div>
    </div>

    <!-- ===== 背景切换 ===== -->
    <div class="bg-switcher" id="bgSwitcher" title="切换背景主题">
        <span class="icon">🎨</span>
    </div>
    <div class="bg-tooltip" id="bgTooltip">背景主题 1/5</div>

    <!-- ===== 全屏按钮 ===== -->
    <div class="fullscreen-btn" id="fullscreenBtn" title="全屏模式">
        <span class="icon">⛶</span>
    </div>

    <!-- ===== 主面板 ===== -->
    <div class="mc-panel" id="mcPanel">
        <h1 class="mc-title">开！！</h1>

        <!-- 搜索 -->
        <div class="search-wrapper">
            <input class="search-input" id="searchInput" type="text" placeholder="搜索点什么吧..." autocomplete="off">
            <div class="search-engine-tabs" id="engineTabs">
                <span class="search-engine-tab active" data-engine="google">Google</span>
                <span class="search-engine-tab" data-engine="bing">Bing</span>
                <span class="search-engine-tab" data-engine="baidu">百度</span>
                <span class="search-engine-tab" data-engine="duckduckgo">Duck</span>
            </div>
            <button class="search-btn" id="searchBtn">🔍 搜索</button>
        </div>

        <div class="search-divider"></div>

        <!-- ===== 链接工具栏 ===== -->
        <div class="link-toolbar">
            <div class="filter-group" id="categoryFilter">
                <span class="filter-tab active" data-cat="全部">📂 全部</span>
                <!-- 动态渲染分类标签 -->
            </div>
            <input class="link-search-input" id="linkSearchInput" type="text" placeholder="🔎 筛选链接..." autocomplete="off">
            <button class="manage-btn" id="manageBtn">⚙️ 管理</button>
        </div>

        <!-- ===== 链接列表 ===== -->
        <div id="presetLinks">
            <!-- 由 JavaScript 动态渲染 -->
            <div class="no-links-msg">⛏️ 加载链接中...</div>
        </div>

        <!-- ===== 每日名言 ===== -->
        <div class="tip-section">
            <span class="tip-label">📖 每日名言</span>
            <span class="tip-content" id="tipContent">✨ 加载名言中...</span>
            <button class="tip-refresh" id="tipRefresh">🔄</button>
        </div>

        <div class="tip-text">(づ′▽`)づ 挖矿愉快！</div>
    </div>

    <!-- ===== 模态框：链接管理 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">✕</button>
            <div class="modal-title" id="modalTitle">⚙️ 管理链接</div>
            <form class="modal-form" id="modalForm" autocomplete="off">
                <input type="hidden" id="editId" value="">

                <label for="modalTitleInput">标题 *</label>
                <input type="text" id="modalTitleInput" placeholder="例如：我的世界中文维基" required>

                <label for="modalUrlInput">链接 *</label>
                <input type="url" id="modalUrlInput" placeholder="https://example.com" required>

                <label for="modalCategoryInput">分类</label>
                <select id="modalCategoryInput">
                    <option value="工具">🔧 工具</option>
                    <option value="教程">📖 教程</option>
                    <option value="资源">📦 资源</option>
                    <option value="社区">🌐 社区</option>
                    <option value="其他">📌 其他</option>
                </select>

                <div class="modal-actions">
                    <button type="submit" id="modalSaveBtn">💾 保存</button>
                    <button type="button" class="btn-secondary" id="modalCancelBtn">取消</button>
                </div>
                <div style="margin-top:10px; text-align:center;">
                    <button type="button" class="btn-danger" id="modalDeleteBtn" style="display:none; width:auto; padding:6px 20px; font-size:14px;">🗑️ 删除此链接</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ========================================================================
            // 1. 时间 & 同步 (原功能保留)
            // ========================================================================
            const hmsDom = document.getElementById('hms');
            const dateDom = document.getElementById('date');
            const syncStatusDom = document.getElementById('syncStatus');
            const formatHintDom = document.getElementById('formatHint');
            const timePanel = document.getElementById('timePanel');
            const weekArr = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

            let timeOffset = 0;
            let hasSynced = false;
            let use12Hour = localStorage.getItem('use12Hour') === 'true';

            function updateFormatHint() {
                formatHintDom.textContent = use12Hour ? '12小时制 · 点击切换' : '24小时制 · 点击切换';
            }
            updateFormatHint();

            timePanel.addEventListener('click', () => {
                use12Hour = !use12Hour;
                localStorage.setItem('use12Hour', use12Hour);
                updateFormatHint();
                updateTime();
            });

            function formatTime(h, m, s) {
                const mp = String(m).padStart(2, '0');
                const sp = String(s).padStart(2, '0');
                if (use12Hour) {
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    let h12 = h % 12;
                    if (h12 === 0) h12 = 12;
                    return `${String(h12).padStart(2,'0')}:${mp}:${sp} ${ampm}`;
                }
                return `${String(h).padStart(2,'0')}:${mp}:${sp}`;
            }

            function updateTime() {
                const calibratedNow = new Date(Date.now() + timeOffset);
                const h = calibratedNow.getHours();
                const m = calibratedNow.getMinutes();
                const s = calibratedNow.getSeconds();
                const y = calibratedNow.getFullYear();
                const mon = String(calibratedNow.getMonth() + 1).padStart(2, '0');
                const d = String(calibratedNow.getDate()).padStart(2, '0');
                const week = weekArr[calibratedNow.getDay()];
                hmsDom.innerText = formatTime(h, m, s);
                dateDom.innerText = `${y}年${mon}月${d}日 ${week}`;
            }

            async function fetchFromWorldTimeAPI() {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                try {
                    const response = await fetch('https://worldtimeapi.org/api/timezone/Asia/Shanghai', { signal: controller
                            .signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    return data.unixtime * 1000;
                } catch (err) {
                    clearTimeout(timeoutId);
                    throw new Error('WorldTimeAPI: ' + err.message);
                }
            }

            async function fetchFromTimeAPIio() {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                try {
                    const response = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Shanghai', { signal: controller
                            .signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    const utcMs = Date.UTC(data.year, data.month - 1, data.day, data.hour, data.minute, data.seconds, data
                        .milliSeconds || 0) - 8 * 3600 * 1000;
                    return utcMs;
                } catch (err) {
                    clearTimeout(timeoutId);
                    throw new Error('TimeAPI.io: ' + err.message);
                }
            }

            async function syncNetworkTime() {
                if (!hasSynced) {
                    syncStatusDom.textContent = '⏳ 正在同步网络时间';
                    syncStatusDom.style.color = '#ffd700';
                }
                let networkUtcMs = null;
                let apiSource = '';
                try {
                    networkUtcMs = await fetchFromWorldTimeAPI();
                    apiSource = 'WorldTimeAPI';
                } catch (err1) {
                    console.warn('主API失败:', err1.message);
                    try {
                        networkUtcMs = await fetchFromTimeAPIio();
                        apiSource = 'TimeAPI.io';
                    } catch (err2) {
                        console.error('所有API均失败:', err2.message);
                        if (!hasSynced) {
                            syncStatusDom.textContent = '⚠️ 网络同步失败，使用本地时间';
                            syncStatusDom.style.color = '#ff9f43';
                        }
                        return;
                    }
                }
                const localNow = Date.now();
                timeOffset = networkUtcMs - localNow;
                hasSynced = true;
                const offsetMs = Math.abs(timeOffset);
                const offsetSign = timeOffset >= 0 ? '+' : '-';
                syncStatusDom.textContent = `✅ 已同步 · ${apiSource} · 偏差${offsetSign}${(offsetMs/1000).toFixed(2)}秒`;
                syncStatusDom.style.color = '#7bed9f';
                console.log(`[时间同步] ${apiSource} 偏移: ${timeOffset}ms`);
            }

            // ========================================================================
            // 2. 访问计数
            // ========================================================================
            const visitCounterDom = document.getElementById('visitCounter');

            function updateVisitCounter() {
                const today = new Date().toDateString();
                const stored = localStorage.getItem('visitData');
                let data = stored ? JSON.parse(stored) : { date: today, count: 0 };
                if (data.date !== today) {
                    data = { date: today, count: 0 };
                }
                data.count += 1;
                localStorage.setItem('visitData', JSON.stringify(data));
                visitCounterDom.textContent = `📊 今日访问: ${data.count}`;
            }
            updateVisitCounter();

            // ========================================================================
            // 3. 背景切换 (原功能保留)
            // ========================================================================
            const bgSwitcher = document.getElementById('bgSwitcher');
            const bgTooltip = document.getElementById('bgTooltip');
            let currentBgIndex = parseInt(localStorage.getItem('bgIndex') || '0', 10);
            let bgTooltipTimer = null;

            const bgThemes = [
                { name: '原版默认', filter: 'none', desc: '主题 1/5 · 原版' },
                { name: '暖色黄昏', filter: 'hue-rotate(25deg) saturate(1.2) brightness(1.05)', desc: '主题 2/5 · 暖色' },
                { name: '冷色月光', filter: 'hue-rotate(170deg) saturate(0.85) brightness(0.9)', desc: '主题 3/5 · 冷色' },
                { name: '复古怀旧', filter: 'sepia(40%) hue-rotate(-10deg) brightness(0.95)', desc: '主题 4/5 · 复古' },
                { name: '暗夜深色', filter: 'brightness(0.55) saturate(0.7) hue-rotate(200deg)', desc: '主题 5/5 · 暗夜' },
            ];

            function applyBackground(index) {
                const theme = bgThemes[index % bgThemes.length];
                document.body.style.filter = theme.filter;
                currentBgIndex = index % bgThemes.length;
                localStorage.setItem('bgIndex', currentBgIndex);
                updateBgTooltip();
            }

            function updateBgTooltip() {
                const theme = bgThemes[currentBgIndex];
                bgTooltip.textContent = theme.desc;
                bgTooltip.classList.add('show');
                if (bgTooltipTimer) clearTimeout(bgTooltipTimer);
                bgTooltipTimer = setTimeout(() => bgTooltip.classList.remove('show'), 1800);
            }
            applyBackground(currentBgIndex);
            bgSwitcher.addEventListener('click', () => applyBackground(currentBgIndex + 1));

            // ========================================================================
            // 4. 全屏模式
            // ========================================================================
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen?.() || document.documentElement.webkitRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
                }
            });

            // ========================================================================
            // 5. 搜索引擎 (原功能保留)
            // ========================================================================
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const engineTabs = document.getElementById('engineTabs');
            let currentEngine = localStorage.getItem('searchEngine') || 'google';

            const engineUrls = {
                google: 'https://www.google.com/search?q=',
                bing: 'https://www.bing.com/search?q=',
                baidu: 'https://www.baidu.com/s?wd=',
                duckduckgo: 'https://duckduckgo.com/?q=',
            };

            function setActiveEngineTab(engine) {
                currentEngine = engine;
                localStorage.setItem('searchEngine', engine);
                const tabs = engineTabs.querySelectorAll('.search-engine-tab');
                tabs.forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.engine === engine);
                });
            }
            setActiveEngineTab(currentEngine);

            engineTabs.addEventListener('click', (e) => {
                const tab = e.target.closest('.search-engine-tab');
                if (!tab) return;
                setActiveEngineTab(tab.dataset.engine);
                searchInput.focus();
            });

            function doSearch() {
                const query = searchInput.value.trim();
                if (!query) { searchInput.focus(); return; }
                const baseUrl = engineUrls[currentEngine] || engineUrls['google'];
                window.open(baseUrl + encodeURIComponent(query), '_blank');
            }
            searchBtn.addEventListener('click', doSearch);
            searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

            // ========================================================================
            // 6. 链接管理 (核心新功能)
            // ========================================================================
            const linkContainer = document.getElementById('presetLinks');
            const categoryFilter = document.getElementById('categoryFilter');
            const linkSearchInput = document.getElementById('linkSearchInput');
            const manageBtn = document.getElementById('manageBtn');

            // 默认预设链接
            const defaultLinks = [
                { id: 1, title: '📝 记事本', url: 'https://note.ms/Helloworld150103201003063014Him369258Stars',
                category: '工具' },
                { id: 2, title: '⛏️ Minecraft开发教程', url: 'https://beishanair.github.io/2099/12/31/sum/',
                category: '教程' },
                { id: 3, title: '🔥 Forge开发构建 (解析异常)', url: 'https://blog.csdn.net/HJW_233/article/details/157209737',
                    category: '教程', error: true },
                { id: 4, title: '🧊 Minecraft神秘小网站', url: 'https://mcblock.top/', category: '资源' },
                { id: 5, title: '🧪 测试链接 1', url: '#', category: '其他' },
                { id: 6, title: '🧪 测试链接 2', url: '#', category: '其他' },
                { id: 7, title: '🧪 测试链接 3', url: '#', category: '其他' },
                { id: 8, title: '🧪 测试链接 4', url: '#', category: '其他' },
                { id: 9, title: '🧪 测试链接 5', url: '#', category: '其他' },
                { id: 10, title: '🧪 测试链接 6', url: '#', category: '其他' },
                { id: 11, title: '🧪 测试链接 7', url: '#', category: '其他' },
                { id: 12, title: '🧪 测试链接 8', url: '#', category: '其他' },
            ];

            // 加载链接数据
            function loadLinks() {
                const stored = localStorage.getItem('mcLinks');
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                    } catch (_) { /* ignore */ }
                }
                // 首次使用，写入默认
                localStorage.setItem('mcLinks', JSON.stringify(defaultLinks));
                return [...defaultLinks];
            }

            function saveLinks(links) {
                localStorage.setItem('mcLinks', JSON.stringify(links));
            }

            let links = loadLinks();
            let currentCategory = '全部';
            let searchQuery = '';

            // 获取所有分类
            function getAllCategories() {
                const cats = new Set(links.map(l => l.category || '其他'));
                return ['全部', ...Array.from(cats).sort()];
            }

            // 渲染分类标签
            function renderCategoryTabs() {
                const cats = getAllCategories();
                const activeCat = currentCategory;
                categoryFilter.innerHTML = cats.map(cat =>
                    `<span class="filter-tab ${cat === activeCat ? 'active' : ''}" data-cat="${cat}">${cat === '全部' ? '📂 全部' : '📌 ' + cat}</span>`
                ).join('');
                // 绑定点击事件
                categoryFilter.querySelectorAll('.filter-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        currentCategory = tab.dataset.cat;
                        renderCategoryTabs();
                        renderLinks();
                    });
                });
            }

            // 渲染链接列表
            function renderLinks() {
                let filtered = [...links];

                // 分类筛选
                if (currentCategory !== '全部') {
                    filtered = filtered.filter(l => (l.category || '其他') === currentCategory);
                }

                // 搜索筛选
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    filtered = filtered.filter(l => l.title.toLowerCase().includes(q) || (l.url || '').toLowerCase().includes(
                    q));
                }

                if (filtered.length === 0) {
                    linkContainer.innerHTML = `<div class="no-links-msg">🕳️ 没有找到链接，点「管理」添加吧！</div>`;
                    return;
                }

                linkContainer.innerHTML = filtered.map(link => {
                    const isError = link.error ? 'error' : '';
                    const cat = link.category || '其他';
                    const icon = cat === '工具' ? '🔧' : cat === '教程' ? '📖' : cat === '资源' ? '📦' : cat === '社区' ? '🌐' :
                        '📌';
                    return `
                        <a class="link-item ${isError}" href="${link.url}" target="_blank" rel="noopener noreferrer" data-id="${link.id}">
                            <span class="link-category">${icon} ${cat}</span>
                            <span class="link-title">${link.title}</span>
                            ${isError ? '<span class="link-badge">⚠️ 异常</span>' : ''}
                            <button class="link-edit" data-id="${link.id}" title="编辑">✏️</button>
                            <button class="link-delete" data-id="${link.id}" title="删除">✕</button>
                        </a>
                    `;
                }).join('');

                // 绑定编辑/删除事件（委托）
                linkContainer.querySelectorAll('.link-edit').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        const id = parseInt(btn.dataset.id, 10);
                        openEditModal(id);
                    });
                });
                linkContainer.querySelectorAll('.link-delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        const id = parseInt(btn.dataset.id, 10);
                        if (confirm('确定要删除这个链接吗？')) {
                            deleteLink(id);
                        }
                    });
                });

                // 链接点击音效 + 统计（可选）
                linkContainer.querySelectorAll('.link-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        if (e.target.closest('.link-edit') || e.target.closest('.link-delete')) return;
                        playClickSound();
                    });
                });
            }

            // 增删改操作
            function addLink(title, url, category) {
                const maxId = links.reduce((max, l) => Math.max(max, l.id), 0);
                const newLink = {
                    id: maxId + 1,
                    title: title.trim(),
                    url: url.trim(),
                    category: category || '其他',
                    error: false,
                };
                links.push(newLink);
                saveLinks(links);
                renderCategoryTabs();
                renderLinks();
                return newLink;
            }

            function editLink(id, title, url, category) {
                const idx = links.findIndex(l => l.id === id);
                if (idx === -1) return false;
                links[idx].title = title.trim();
                links[idx].url = url.trim();
                links[idx].category = category || '其他';
                saveLinks(links);
                renderCategoryTabs();
                renderLinks();
                return true;
            }

            function deleteLink(id) {
                links = links.filter(l => l.id !== id);
                saveLinks(links);
                const cats = getAllCategories();
                if (currentCategory !== '全部' && !cats.includes(currentCategory)) {
                    currentCategory = '全部';
                }
                renderCategoryTabs();
                renderLinks();
            }

            // ========================================================================
            // 7. 模态框 (链接管理界面)
            // ========================================================================
            const modalOverlay = document.getElementById('modalOverlay');
            const modalClose = document.getElementById('modalClose');
            const modalCancelBtn = document.getElementById('modalCancelBtn');
            const modalForm = document.getElementById('modalForm');
            const modalTitle = document.getElementById('modalTitle');
            const editIdInput = document.getElementById('editId');
            const modalTitleInput = document.getElementById('modalTitleInput');
            const modalUrlInput = document.getElementById('modalUrlInput');
            const modalCategoryInput = document.getElementById('modalCategoryInput');
            const modalSaveBtn = document.getElementById('modalSaveBtn');
            const modalDeleteBtn = document.getElementById('modalDeleteBtn');

            function openModal(title, linkData) {
                modalTitle.textContent = title;
                if (linkData) {
                    editIdInput.value = linkData.id;
                    modalTitleInput.value = linkData.title;
                    modalUrlInput.value = linkData.url;
                    modalCategoryInput.value = linkData.category || '其他';
                    modalDeleteBtn.style.display = 'inline-block';
                    modalSaveBtn.textContent = '💾 更新';
                } else {
                    editIdInput.value = '';
                    modalTitleInput.value = '';
                    modalUrlInput.value = '';
                    modalCategoryInput.value = '其他';
                    modalDeleteBtn.style.display = 'none';
                    modalSaveBtn.textContent = '💾 保存';
                }
                modalOverlay.classList.add('open');
                setTimeout(() => modalTitleInput.focus(), 100);
            }

            function closeModal() {
                modalOverlay.classList.remove('open');
            }

            function openEditModal(id) {
                const link = links.find(l => l.id === id);
                if (!link) return;
                openModal('✏️ 编辑链接', link);
            }

            modalClose.addEventListener('click', closeModal);
            modalCancelBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });

            modalForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const title = modalTitleInput.value.trim();
                const url = modalUrlInput.value.trim();
                const category = modalCategoryInput.value;
                if (!title || !url) {
                    alert('标题和链接都不能为空！');
                    return;
                }
                const editId = parseInt(editIdInput.value, 10);
                if (editId) {
                    editLink(editId, title, url, category);
                } else {
                    addLink(title, url, category);
                }
                closeModal();
                playClickSound();
            });

            modalDeleteBtn.addEventListener('click', () => {
                const id = parseInt(editIdInput.value, 10);
                if (!id) return;
                if (confirm('确定要永久删除这个链接吗？')) {
                    deleteLink(id);
                    closeModal();
                    playClickSound();
                }
            });

            manageBtn.addEventListener('click', () => {
                openModal('⚙️ 添加新链接', null);
            });

            // ========================================================================
            // 8. 链接搜索过滤
            // ========================================================================
            linkSearchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderLinks();
            });

            // ========================================================================
            // 9. Minecraft 音效 (Web Audio)
            // ========================================================================
            let audioCtx = null;

            function playClickSound() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    }
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.06);
                    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.08);
                } catch (_) { /* 静默降级 */ }
            }

            // ========================================================================
            // 10. 每日名言 (从 API 获取)
            // ========================================================================
            const tipContent = document.getElementById('tipContent');
            const tipRefresh = document.getElementById('tipRefresh');

            async function fetchDailyQuote() {
                const tipElement = document.getElementById('tipContent');

                // 1. 检查 sessionStorage 缓存 (1小时)
                const cachedData = sessionStorage.getItem('dailyQuote');
                const cachedTime = sessionStorage.getItem('dailyQuoteTime');
                const now = Date.now();

                if (cachedData && cachedTime && (now - parseInt(cachedTime, 10) < 3600000)) {
                    tipElement.textContent = cachedData;
                    return;
                }

                tipElement.textContent = '📖 加载名言中...';
                try {
                    const response = await fetch('https://api.quotable.io/random');
                    if (!response.ok) throw new Error('API 响应错误');
                    const data = await response.json();
                    const quoteText = `“${data.content}” — ${data.author}`;
                    tipElement.textContent = quoteText;

                    // 保存到 sessionStorage
                    sessionStorage.setItem('dailyQuote', quoteText);
                    sessionStorage.setItem('dailyQuoteTime', String(now));
                } catch (error) {
                    console.warn('名言 API 获取失败，使用备用名言。', error);
                    // 检查 sessionStorage 中是否有旧数据，即使过期也可以作为备用
                    if (cachedData) {
                        tipElement.textContent = cachedData + ' (⚡ 离线)';
                        return;
                    }
                    const fallbackQuotes = [
                        "生活中唯一的失败就是放弃。 — 未知",
                        "今日事，今日毕。 — 富兰克林",
                        "知识就是力量。 — 培根",
                        "行动是治愈恐惧的良药。 — 威廉·詹姆斯",
                        "保持冷静，继续前进。 — 丘吉尔"
                    ];
                    const randomIndex = Math.floor(Math.random() * fallbackQuotes.length);
                    tipElement.textContent = fallbackQuotes[randomIndex];
                }
            }

            // 页面加载时获取名言
            fetchDailyQuote();

            // 刷新按钮
            tipRefresh.addEventListener('click', () => {
                // 清除缓存，强制刷新
                sessionStorage.removeItem('dailyQuote');
                sessionStorage.removeItem('dailyQuoteTime');
                fetchDailyQuote();
                playClickSound();
            });

            // ========================================================================
            // 11. 初始化
            // ========================================================================
            function init() {
                updateTime();
                setInterval(updateTime, 1000);
                syncNetworkTime();
                setInterval(syncNetworkTime, 30 * 60 * 1000);
                updateFormatHint();

                renderCategoryTabs();
                renderLinks();

                console.log('⛏️ Minecraft导航台已启动 | 自定义链接 · 分类筛选 · 音效 · 每日名言');
            }

            document.addEventListener('click', (e) => {
                const link = e.target.closest('.link-item');
                if (link && !e.target.closest('.link-edit') && !e.target.closest('.link-delete')) {
                    // 已在内联事件中播放
                }
            });

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
                if (e.key === 'Escape') {
                    if (modalOverlay.classList.contains('open')) closeModal();
                }
            });

            init();

        })();
    </script>
</body>
